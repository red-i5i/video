<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages Dynamic Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-wrapper">
    <h2 id="videoTitle">Loading video...</h2>
    
    <!-- Video Player -->
    <video 
      id="videoPlayer" 
      controls 
      crossorigin="anonymous" 
      preload="metadata">
      <source id="videoSource" src="" type="">
      Your browser does not support the video tag.
    </video>

    <!-- Error Message (Hidden by default) -->
    <div id="errorMessage" class="error-box" style="display: none;">
      <p>⚠️ Video not found in <code>/assets/</code>!</p>
      <small id="errorDetails"></small>
    </div>
  </div>

  <script src="player.js"></script>
</body>
  </html>
